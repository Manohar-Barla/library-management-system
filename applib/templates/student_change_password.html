{% extends 'base_student.html' %}

{% block page_title %}Security Settings{% endblock %}

{% block extra_css %}
<style>
    .alert {
        padding: 15px;
        border-radius: 6px;
        margin-bottom: 20px;
        border: 1px solid transparent;
    }

    .alert-error {
        background: #ffebee;
        color: #d32f2f;
        border-color: #ffcdd2;
    }

    .alert-success {
        background: #e8f5e9;
        color: #2e7d32;
        border-color: #c8e6c9;
    }
</style>
{% endblock %}


{% block content %}
<div class="card" style="max-width: 500px; margin: 0 auto;">
    <h2 class="card-title">Change Password</h2>

    {% if messages %}
    <div style="margin-bottom: 20px;">
        {% for message in messages %}
        <div class="alert {% if 'error' in message.tags %}alert-error{% else %}alert-success{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <div class="form-group" style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 500; color: #555;">Current Password</label>
            <input type="password" name="old_password" required
                style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem;">
        </div>

        <div class="form-group" style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 500; color: #555;">New Password</label>
            <input type="password" name="new_password" required minlength="8"
                style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem;">
        </div>

        <div class="form-group" style="margin-bottom: 25px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 500; color: #555;">Confirm New
                Password</label>
            <input type="password" name="confirm_password" required minlength="8"
                style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem;">
        </div>

        <button type="submit" class="btn btn-primary"
            style="background: var(--primary); color: white; padding: 12px 25px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; display: block; width: 100%;">
            Update Password
        </button>
    </form>
</div>
{% endblock %}
