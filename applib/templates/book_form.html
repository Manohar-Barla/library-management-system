{% extends 'base_admin.html' %}

{% block page_title %}
    {% if book %}Edit Book{% else %}Add Book{% endif %}
{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2 class="card-title">
        {% if book %}Update Book Details{% else %}Register New Book{% endif %}
    </h2>

    <form method="POST">
        {% csrf_token %}

        <!-- ISBN -->
        <div class="form-group" style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 500; color: #555;">ISBN</label>
            <input type="text"
                   name="isbn"
                   required
                   value="{{ book.isbn|default:'' }}"
                   style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem;">
        </div>

        <!-- Title -->
        <div class="form-group" style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 500; color: #555;">Title</label>
            <input type="text"
                   name="title"
                   required
                   value="{{ book.title|default:'' }}"
                   style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem;">
        </div>

        <!-- Author -->
        <div class="form-group" style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 500; color: #555;">Author</label>
            <select name="author"
                    required
                    style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem;">

                <option value="">Select Author...</option>

                {% for author in authors %}
                    <option value="{{ author.id }}"
                        {% if book and book.author.id == author.id %}selected{% endif %}>
                        {{ author.name }}
                    </option>
                {% endfor %}
            </select>

            <small style="display: block; margin-top: 5px; color: #777;">
                If author is not listed,
                <a href="{% url 'author_add' %}" style="color: var(--primary);">
                    add them first
                </a>.
            </small>
        </div>

        <!-- Category -->
        <div class="form-group" style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 500; color: #555;">Category</label>
            <select name="category"
                    required
                    style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem;">

                <option value="">Select Category...</option>

                {% for category in categories %}
                    <option value="{{ category.id }}"
                        {% if book and book.category.id == category.id %}selected{% endif %}>
                        {{ category.name }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <!-- Copies Section -->
        <div style="display: flex; gap: 15px; margin-bottom: 25px;">

            <div class="form-group" style="flex: 1;">
                <label style="display: block; margin-bottom: 8px; font-weight: 500; color: #555;">
                    Total Copies
                </label>
                <input type="number"
                       name="total_copies"
                       min="1"
                       required
                       value="{{ book.total_copies|default:'1' }}"
                       style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem;">
            </div>

            <div class="form-group" style="flex: 1;">
                <label style="display: block; margin-bottom: 8px; font-weight: 500; color: #555;">
                    Available Copies
                </label>
                <input type="number"
                       name="available_copies"
                       min="0"
                       required
                       value="{{ book.available_copies|default:'1' }}"
                       style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem;">
            </div>

        </div>

        <!-- Buttons -->
        <div style="display: flex; gap: 15px;">
            <button type="submit"
                    class="btn btn-primary"
                    style="background: var(--primary); color: white; padding: 12px 25px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer;">
                {% if book %}Update Book{% else %}Save Book{% endif %}
            </button>

            <a href="{% url 'book_list' %}"
               style="background: #f1f3f5; color: #555; padding: 12px 25px; text-decoration: none; border-radius: 6px; font-weight: 600;">
               Cancel
            </a>
        </div>

    </form>
</div>
{% endblock %}
