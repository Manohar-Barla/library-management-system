{% extends 'base_admin.html' %}

{% block page_title %}{% if category %}Edit Category{% else %}Add Category{% endif %}{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2 class="card-title">{% if category %}Update Category Details{% else %}Create New Category{% endif %}</h2>

    <form method="POST">
        {% csrf_token %}
        <div class="form-group" style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 500; color: #555;">Category Name</label>
            <input type="text" name="name" required value="{{ category.name|default:'' }}"
                style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem;">
        </div>

        <div class="form-group" style="margin-bottom: 25px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 500; color: #555;">Description
                (Optional)</label>
            <textarea name="description" rows="4"
                style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; resize: vertical;">{{ category.description|default:'' }}</textarea>
        </div>

        <div style="display: flex; gap: 15px;">
            <button type="submit" class="btn btn-primary"
                style="background: var(--primary); color: white; padding: 12px 25px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer;">
                {% if category %}Update Category{% else %}Save Category{% endif %}
            </button>
            <a href="{% url 'category_list' %}"
                style="background: #f1f3f5; color: #555; padding: 12px 25px; text-decoration: none; border-radius: 6px; font-weight: 600;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
