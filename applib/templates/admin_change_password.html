{% extends 'base_admin.html' %}

{% block page_title %}Change Password{% endblock %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 0 auto;">
    <h2 class="card-title">Update Your Password</h2>

    {% if messages %}
    <div style="margin-bottom: 20px;">
        {% for message in messages %}
        <div
            style="padding: 15px; border-radius: 6px; background: {% if message.tags == 'error' %}#ffebee; color: #d32f2f; border: 1px solid #ffcdd2;{% else %}#e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9;{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <div class="form-group" style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 500; color: #555;">Current Password</label>
            <input type="password" name="old_password" required
                style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem;">
        </div>

        <div class="form-group" style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 500; color: #555;">New Password</label>
            <input type="password" name="new_password" required minlength="8"
                style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem;">
        </div>

        <div class="form-group" style="margin-bottom: 25px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 500; color: #555;">Confirm New
                Password</label>
            <input type="password" name="confirm_password" required minlength="8"
                style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem;">
        </div>

        <button type="submit" class="btn btn-primary"
            style="background: var(--primary); color: white; padding: 12px 25px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; width: 100%;">
            Change Password
        </button>
    </form>
</div>
{% endblock %}
