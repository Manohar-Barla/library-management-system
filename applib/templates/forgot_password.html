<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Library Management System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #f5f7fa;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-container {
            background: #fff;
            width: 450px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header i {
            font-size: 3rem;
            color: #1e3c72;
            margin-bottom: 15px;
        }

        .login-header h2 {
            color: #333;
            font-size: 1.5rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
        }

        .input-group {
            position: relative;
            display: flex;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #777;
        }

        .input-group input {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-color: #1e3c72;
        }

        .otp-group {
            display: none;
        }

        .otp-row {
            display: flex;
            gap: 10px;
        }

        .otp-row input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .btn-otp {
            background: #1e3c72;
            color: white;
            border: none;
            padding: 0 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background: #1e3c72;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
            display: none;
        }

        .btn-submit:hover {
            background: #2a5298;
        }

        .alert-message {
            margin-bottom: 20px;
            font-size: 0.9rem;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            display: none;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <div class="login-header">
            <i class="fas fa-lock"></i>
            <h2>Password Recovery</h2>
            <p style="color: #666; font-size: 0.9rem; margin-top: 10px;">Enter your registered email to reset your
                password.</p>
        </div>

        {% if messages %}
        {% for message in messages %}
        <div
            style="padding: 10px; border-radius: 6px; text-align: center; margin-bottom: 20px; background: {% if message.tags == 'error' %}#ffebee; color: #d32f2f; border: 1px solid #ffcdd2;{% else %}#e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9;{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}

        <form method="POST" id="recoveryForm">
            {% csrf_token %}

            <div id="statusMessage" class="alert-message"></div>

            <div class="form-group" id="emailGroup">
                <label>Email Address</label>
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" name="email" required placeholder="Enter your email">
                </div>
                <button type="button" class="btn-otp" onclick="sendOTP()"
                    style="width: 100%; margin-top: 15px; padding: 12px;">Send OTP</button>
            </div>

            <div class="form-group otp-group" id="otpGroup">
                <label>Verify OTP</label>
                <div class="otp-row">
                    <input type="text" id="email_otp" placeholder="Enter 6-digit OTP">
                    <button type="button" class="btn-otp" onclick="verifyOTP()">Verify</button>
                </div>
            </div>

            <div id="passwordGroup" style="display: none;">
                <div class="form-group">
                    <label>New Password</label>
                    <div class="input-group">
                        <i class="fas fa-key"></i>
                        <input type="password" id="new_password" name="new_password" required minlength="8"
                            placeholder="Enter new password">
                    </div>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="input-group">
                        <i class="fas fa-key"></i>
                        <input type="password" id="confirm_password" name="confirm_password" required minlength="8"
                            placeholder="Confirm password">
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">Reset Password</button>

            <div style="text-align: center; margin-top: 20px;">
                <a href="{% url 'login' %}"
                    style="color: #1e3c72; text-decoration: none; font-weight: 500; font-size: 0.95rem;">Back to
                    Login</a>
            </div>
        </form>
    </div>

    <script>
        function showMessage(msg, isError = false) {
            const el = document.getElementById('statusMessage');
            el.style.display = 'block';
            el.innerHTML = msg;
            if (isError) {
                el.style.background = '#ffebee';
                el.style.color = '#d32f2f';
                el.style.border = '1px solid #ffcdd2';
            } else {
                el.style.background = '#e8f5e9';
                el.style.color = '#2e7d32';
                el.style.border = '1px solid #c8e6c9';
            }
        }

        function sendOTP() {
            const email = document.getElementById("email").value;
            if (!email) {
                showMessage("Please enter your email", true);
                return;
            }

            showMessage("Sending OTP...");

            fetch("{% url 'send_email_otp' %}", {
                method: "POST",
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded",
                    "X-CSRFToken": document.querySelector("[name=csrfmiddlewaretoken]").value
                },
                body: "email=" + encodeURIComponent(email)
            })
                .then(res => res.json())
                .then(data => {
                    if (data.status === "success") {
                        showMessage("OTP Sent to " + email);
                        document.getElementById('otpGroup').style.display = 'block';
                        document.getElementById('email').readOnly = true;
                    } else {
                        showMessage(data.message || "Failed to send OTP", true);
                    }
                })
                .catch(err => showMessage("Something went wrong.", true));
        }

        function verifyOTP() {
            const otp = document.getElementById("email_otp").value;
            if (!otp) {
                showMessage("Enter OTP first", true);
                return;
            }

            showMessage("Verifying...");

            fetch("{% url 'verify_email_otp' %}", {
                method: "POST",
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded",
                    "X-CSRFToken": document.querySelector("[name=csrfmiddlewaretoken]").value
                },
                body: "otp=" + encodeURIComponent(otp)
            })
                .then(res => res.json())
                .then(data => {
                    if (data.status === "success") {
                        showMessage("OTP Verified! You can now reset your password.");
                        document.getElementById('otpGroup').style.display = 'none';
                        document.getElementById('passwordGroup').style.display = 'block';
                        document.getElementById('submitBtn').style.display = 'block';
                    } else {
                        showMessage(data.message || "Invalid OTP", true);
                    }
                })
                .catch(err => showMessage("Verification failed.", true));
        }

        // Prevent form submission if passwords don't match
        document.getElementById('recoveryForm').onsubmit = function (e) {
            const p1 = document.getElementById('new_password').value;
            const p2 = document.getElementById('confirm_password').value;
            if (p1 !== p2) {
                e.preventDefault();
                showMessage("New passwords do not match!", true);
            }
        };
    </script>
</body>

</html>
