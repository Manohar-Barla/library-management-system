{% block extra_css %}
<style>
    .alert {
        padding: 15px;
        border-radius: 6px;
        margin-bottom: 20px;
        border: 1px solid transparent;
    }

    .alert-error {
        background: #ffebee;
        color: #d32f2f;
        border-color: #ffcdd2;
    }

    .alert-success {
        background: #e8f5e9;
        color: #2e7d32;
        border-color: #c8e6c9;
    }
</style>
{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2 class="card-title">Issue a Book to Student</h2>

    {% if messages %}
    <div style="margin-bottom: 20px;">
        {% for message in messages %}
        <div class="alert {% if message.tags == 'error' %}alert-error{% else %}alert-success{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <div class="form-group" style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 500; color: #555;">Student (Roll No /
                ID)</label>
            <select name="student_id" required
                style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem;">
                <option value="">Select Student...</option>
                {% for student in students %}
                <option value="{{ student.id }}">{{ student.username }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group" style="margin-bottom: 25px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 500; color: #555;">Book</label>
            <select name="book_id" required
                style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem;">
                <option value="">Select Book...</option>
                {% for book in books %}
                <option value="{{ book.id }}">{{ book.title }} (Available: {{ book.available_copies }})</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group" style="margin-bottom: 25px;">
            <label style="display: block; margin-bottom: 8px; font-weight: 500; color: #555;">Due Date (Expected Return
                Date)</label>
            <input type="date" name="due_date" required
                style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem;">
        </div>

        <div style="display: flex; gap: 15px;">
            <button type="submit" class="btn btn-primary"
                style="background: var(--primary); color: white; padding: 12px 25px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer;">
                Issue Book
            </button>
            <a href="{% url 'issue_list' %}"
                style="background: #f1f3f5; color: #555; padding: 12px 25px; text-decoration: none; border-radius: 6px; font-weight: 600;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
